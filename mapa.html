
        <!DOCTYPE html>
        <html>
        <head>

            <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
            <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

            <style>
                #map {

                height: 500px;
                width: 100%;
                
                }
            </style>
         </head>

        <body>

            <div id="map"></div>

            <script>

            const localidades = [{"id":"1","nome":"matriz SP","latitude":"-23.5505","longitude":"-46.6333","categoria":"Sede","descricao":"Escritório principal"},{"id":"2","nome":"Centro Logistico","latitude":"-23.5145","longitude":"-46.7458","categoria":"Logistica","descricao":"Galpão A1"},{"id":"3","nome":"Ponto de Apoio","latitude":"-23.4682","longitude":"-46.5273","categoria":"Apoio","descricao":"Unidade Guarulhos"}];

            const map = L.map('map').setView
                ([-23.511066666666665, -46.635466666666666],
                13
            );

            for(let i = 0; i < localidades.length; i++){
                L.marker([localidades[i].latitude, localidades[i].longitude])
                .addTo(map);
            }

            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(map); 
    
            </script>

        </body>

        </html>
